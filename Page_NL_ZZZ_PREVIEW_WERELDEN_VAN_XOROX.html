{"ID":"H02","Caption":"II","Content":
`<p>Door de straten van dit mistroostige toneel liep een man. Hij leek van middelbare leeftijd en zijn hoofd was helemaal kaal. Hij droeg een zwart leren jack en een strakke zwarte spijkerbroek. Dat was al iets vreemds omdat spijkerbroeken niet in het modebeeld van Xorox hoorden. Verder droeg hij een paar cowboyachtige laarzen. Zo liep hij door de regenplassen. Hij was tot aan zijn hemd toe nat, maar dat leek hem eigenlijk niet te storen. Hij leek vooral een café te zoeken. En die waren er genoeg. Cafés die weliswaar ook dienst deden als vechthonk en hoerentent, maar dat maakte verder niet uit.<br />
Bij een rokerig café hield hij halt en hij keek over de klapdeurtjes naar binnen. Met een strakke blik leek hij een van de serveersters in de gaten te houden. Nu moet het gezegd worden dat ze er beslist niet lelijk uitzag. Ze had een kort rokje aan en haar bovenkleding kon haar cupmaat niet verhullen. Haar lange golvende blonde haar leek haast te dansen op haar bewegingen, maar haar gezicht had een duidelijke blik die zei &quot;Don't mess with me.&quot; Nu kwam zo'n waarschuwing op Pisangrium altijd terecht bij dovemansoren, maar de man zag al meteen dat iemand die deze waarschuwing in de wind sloeg zonder pardon een trap in zijn gezicht kreeg.<br />
Hij bekeek haar nog een paar keer en liep toen het café binnen.<br />
Zonder zijn blik van haar af te wenden liep hij naar een tafel en ging zitten, en bleef haar zwijgzaam bekijken.<br />
De serveerster leek dit alles niet in de gaten te hebben, en ging gewoon rustig door met bedienen, en het verkopen van trappen aan mannen die hun handen niet thuis konden houden.<br />
&quot;Zeg Gazina,&quot; zei een andere serveerster opeens. &quot;Die kale daar houdt je nu al geruime tijd in de gaten. Volgens mij wil hij iets van je!&quot;<br />
De man fronste nog eens diep bij het horen van de naam van de serveerster. <br />
Gazina keek om en zag de man zitten.<br />
&quot;Zeg eens, gluurder, je zit al de hele tijd naar me te kijken, maar zou je niet eens wat bestellen?&quot;<br />
De man zei niets maar gebaarde haar dichterbij te komen.<br />
&quot;Oppassen, Gazina,&quot; zei een collega, maar die wist ook wel dat Gazina zich niet zo makkelijk zou laten pakken.<br />
&quot;Wat moet je van me?&quot; vroeg Gazina.<br />
&quot;Jij bent Gazina?&quot;<br />
&quot;Ja… En wat dan nog?&quot;<br />
&quot;Ik wil graag een grote pul bier, en ik zou je graag willen spreken… Onder vier ogen.&quot;<br />
&quot;Spreken, h&egrave;? Ik ken dat, dat &quot;spreken.&quot; De vorm van spreken die uitsluitend zonder kleren kan worden gedaan.&quot;<br />
&quot;Als iets me niet boeit is het een naakt vrouwenlichaam. Ik wil je alleen maar spreken!&quot;<br />
Gazina keek verbaasd op.<br />
&quot;Je bedoelt dat je het doet met mannen?&quot;<br />
&quot;SSSST! Niet te hard, als een aanhanger van Dhyo het hoort ben ik screwed.&quot;<br />
&quot;Screwed? Wat is screwed?&quot;<br />
&quot;D'r bij, genaaid, whatever. Geef me gewoon maar mijn bier en zorg dat je na sluitingstijd bij de zuidingang van het Warvelbos staat. Wat ik je te vertellen heb is zeer belangrijk.&quot;<br />
Gazina keek zeer verbaasd, ze liep naar de bar, tapte een houten pul bier en gaf deze aan de vreemde man.<br />
Nog voor ze de prijs van het bier kon noemen legde de man een aantal munten voor haar neer op tafel. Verbaasd over het feit dat de man in één keer betaalde en dat ze het geld niet uit hem moest slaan (zoals dat bij de meeste klanten wel het geval was) pakte ze de munten op, en liep terug naar de bar.<br />
&quot;Wat wilde hij van je?&quot;<br />
&quot;Hij wil me spreken, bij de zuidingang van het Warvelbos&quot;<br />
&quot;Ha! Dat spreken ken ik&quot;<br />
&quot;Ik weet niet of ik daar zo bang voor ben,&quot; zei Gazina. &quot;Hij is…eh….,&quot; en ze ging op fluistertoon verder. &quot;van de verkeerde kant.&quot;<br />
Gazinas collega bekeek de man nog eens goed en gniffelde even.<br />
&quot;Dat zou ie kunnen zeggen om je vertrouwen te winnen.&quot;<br />
&quot;Ik weet het niet. Je weet hoe de kerk van Dhyo erover denkt, en hun spionnen zitten over heel Xorox. Maar er is iets vreemds aan hem. Daar ben ik zeker van.&quot;<br />
&quot;Maar zou je wel richting Warvelbos gaan? Je weet dat het daar 's nachts wemelt van de orken.&quot;<br />
&quot;Ik ben niet bang voor een paar orken. Ik vraag me af wat hij me te vertellen heeft. Iets zegt me dat ik het niet leuk ga vinden.&quot;<br />

{"ID":"H04","Caption":"IV","Content":`<p>
&quot;Shran, wat ga je doen?&quot;<br />
Shran keek op. <br />
&quot;Stik,&quot; dacht hij bij zichzelf.<br />
Met zijn groene kattenogen keek hij op.<br />
Shran was een Felon. Een katman. Zijn ogen waren fel groen, en zijn pupillen waren spits zoals van een kat. Hij had twee kattenoren boven op zijn hoofd staan. Hij had vlijmscherpe hoektanden. Verder zag zijn gezicht eruit als dat van een mens. Wel stak er achter uit zijn broek een grote lange gele staart met donkere strepen. Hij droeg geen schoeisel, zoals geen enkele Felon dat deed. Dat was ook lastig daar zijn voeten eruit zagen als kattenpoten.<br />
&quot;Ik ga gewoon op jacht,&quot; zei hij fel.<br />
&quot;Op jacht, h&egrave;?&quot;<br />
Rewaldon, keek zijn zoon nog eens strak aan.<br />
&quot;Ik geloof er geen snars van!&quot;<br />
&quot;En waarom niet?&quot;<br />
&quot;Omdat je net op jacht bent geweest, en je normaal nooit zo gemotiveerd bent voor de jacht.&quot;<br />
&quot;Ik... eh had gewoon een slechte vangst.&quot;<br />
&quot;Een slechte vangst?,&quot; zei Rewaldon sarcastisch. &quot;Je hebt vier edelherten gevangen en dat noem jij een slechte vangst? Jij die normaal gesproken met niet meer dan één konijn thuiskomt, en meestal dat nog niet eens.&quot;<br />
&quot;Is het dan zo slecht dat ik mezelf nog wil verbeteren?&quot;<br />
&quot;Nee, helemaal niet,&quot; zei Rewaldon. &quot;Als je jezelf echt ging verbeteren, niet, maar ik denk dat je van plan bent naar de Mount Felix te gaan.&quot;<br />
&quot;Hoe kom je daar bij?&quot;<br />
&quot;Omdat het deze week al zeker de zesde keer is dat de mannen je uit die buurt hebben weggehaald! Vandaag op yarekdag wordt dat dus de zevende keer en het zou me niets verbazen als je op dhyodag een nieuwe poging ging wagen!&quot;<br />
Shran zuchtte.<br />
&quot;Dus je bent wel degelijk van plan om naar de Mount Felix te gaan,&quot; bromde Rewaldon. &quot;Wanneer leer je nou eens dat je daar weg moet blijven?&quot;<br />
Shran zei niets.<br />
&quot;Wat je doet is gewoon lomp, Shran,&quot; raasde Rewaldon. &quot;Het wemelt daar van de soldaten van Dhyo. Wil je dan zo graag gepakt worden?&quot;<br />
Shran bleef stil.<br />
Toen keek hij kwaad op.<br />
&quot;Moeten we het dan allemaal goed vinden? Dat die lui hier op ons grondgebied de dienst uitmaken? Dat ze de hele Mount Felix verzieken, met waar ze mee bezig zijn?&quot;<br />
&quot;En wat denk jij daar in je eentje aan te gaan doen?&quot;<br />
&quot;Als ik het niet doe, wie dan?&quot;<br />
&quot;Jij lompe sukkel. Jij weet heel goed dat de soldaten van Dhyo veel sterker zijn dan jij. De keizer heeft bevolen ons niet te bemoeien met hen, en weet je waarom? Omdat we dubbel en dwars het onderspit zouden delven als het op een oorlog met Varticonus zou aankomen, en jij wilt het in je eentje tegen die lui opnemen? Wanneer kom je eens bij zinnen?&quot;<br />
&quot;En wat zouden de soldaten van Dhyo eigenlijk zoeken bij de Mount Felix? Heeft daar iemand al over nagedacht? Die lui zitten daar niet voor Jan Joker!&quot;<br />
&quot;Jij weet heel goed dat de Felons zich nooit bemoeid hebben met andermans zaken, dus heeft niemand er boodschap aan waar zij mee bezig zijn. Het wordt eens tijd dat je je eens wat verstandiger gaat gedragen, Shran!&quot;<br />
&quot;Verstandiger? En wat als er nu iets verschrikkelijks in de Mount Felix verborgen zit?&quot;<br />
&quot;Dan is dat ons probleem niet, en zou je juist blij moeten zijn dat de kerk van Dhyo het weghaalt zodat wij er geen last meer van hebben.&quot;<br />
&quot;Er valt met jou niet te praten.&quot;<br />
&quot;Correctie, Shran! Met JOU valt niet te praten. Als ik merk dat je nog één keer bij de Mount Felix in de buurt komt, geef ik je hoogstpersoonlijk aan bij de keizer!&quot;<br />
&quot;Je gaat je eigen zoon in de bak laten gooien?&quot;<br />
&quot;Dan weet ik tenminste zeker dat je geen dwaasheden kunt begaan!&quot;<br />
</p>`},
{"ID":"H06","Caption":"VI","Content":`<p>
&quot;Aaah, dat was heerlijk, ik zweer het je, die wil ik ingelijst!&quot;<br />
Het bleef stil.<br />
&quot;Wat ben je daar stil? Het was geweldig, ik heb nooit geweten hoe lekker het was om een vrouw te zijn tot vandaag.&quot;<br />
Weer kwam er geen antwoord.<br />
&quot;Is er wat, Yarreck?&quot;<br />
Yarreck zweeg en keek somber voor zich uit.<br />
&quot;Het is weer niet gebeurd.&quot;<br />
&quot;Nee, h&egrave;? Moet je zo'n geslaagde vrijpartij nu echt met dat verpesten?&quot;<br />
&quot;Verpesten?,&quot; zei Yarreck. &quot;Amber, wat heeft het voor zin als er geen link is?&quot;<br />
&quot;Zeg nou niet dat je alleen maar met me vrijt omdat je hoopt op een link, h&egrave;?&quot; riep Amber kwaad.<br />
Yarreck zweeg.<br />
&quot;Kun je dat linken gewoon niet eens laten voor wat het is, en gewoon je verstand op nul zetten en van mijn lichaam genieten?&quot; vroeg Amber. &quot;Is die link nu echt belangrijker dan ik?&quot;<br />
&quot;WAT WEET JIJ NU VAN ZOIETS? DE MENSEN HEBBEN JE VERPEST!&quot;<br />
&quot;Durf je dat nog eens te zeggen?&quot; vroeg Amber, en haar stem was zo dreigend at Yarreck geschrokken verder van haar af ging zitten.<br />
Yarreck keek nog eens goed naar Amber. Tja, eigenlijk was ze inderdaad wel een toppunt van vrouw. Althans voor wat Elfen als een ideale vrouw zien als het op uiterlijk aankwam. Ze had een mooie lichte gladde huid, en de schitterende vormen van haar lichaam kwam nu echt goed tot hun recht nu ze in haar blootje voor hem zat. Haar lange blonde haar was licht golvend, en dat kwam bij Elfen niet zoveel voor, daar Elfen meestal strak haar hadden. Om die reden werden vrouwen met golvend haar dan ook als extra mooi beschouwd, en hadden die vrouwen ook nooit veel moeite een man te vinden omdat bijna iedere man erop hoopte ooit zo'n vrouw te krijgen. Yarreck besefte nog eens te meer dat Amber ook nog eens veel voor hem deed en al meerdere keren voor hem door het vuur was gegaan. Nu zijn Elfen van nature heel behulpzaam, maar Amber ging altijd net een stapje verder. Misschien was het daarom wel dat hij iets te graag wilde dat hij juist met haar zou linken. Nu hij erover nadacht moest hij zich eigenlijk gelukkig prijzen dat hij met haar mocht vrijen. Bij Elfen was het dan weliswaar de gewoonste zaak van de wereld om met meerdere personen te vrijen, toch stond Amber erom bekend niet zomaar voor een man uit de kleren te gaan. Hij durfde haar even niet in het gezicht aan te kijken, want Ambers gezicht, was normaliter zo mooi dat je bijna je wil om te leven zou verliezen als je haar uit het oog verloor, maar de weinige momenten dat Amber boos was kon haar gezicht zo dreigend zijn dat je wilde dat je nooit geboren was.<br />
&quot;Sorry,&quot; zei hij toen. &quot;Dat had ik niet mogen zeggen&quot;<br />
&quot;Als je dat maar weet!&quot;<br />
&quot;Ik…. Ik… hou gewoon erg veel van je, je bent zo mooi en lief dat het gewoon mijn grootste nachtmerrie is als één van ons met een ander zou linken.&quot;<br />
&quot;En dat is nu precies waarom het niet lukt,&quot; zei Amber.<br />
&quot;Ik snap het niet. Hoe meer je van iemand houdt hoe groter de kans op een link,&quot; zei Yarreck. &quot;Waarom wil het bij ons dan niet lukken?&quot;<br />
&quot;Omdat je zo geobsedeerd bent van linken dat je vergeet hoeveel je van me houdt,&quot; zei Amber. &quot;Als je nu eens even vergeet dat je met me wil linken tijdens het vrijen nu eens alleen maar denkt aan wat voor een lekker wijf ik ben en van me geniet, en gewoon eens geniet van het feit dat ik van jou geniet. Dat zou als zoveel schelen?&quot;<br />
&quot;Lukt het dan wel?&quot;<br />
&quot;Dat kan ik niet zeggen, maar dan heb je wel een lekkere vrijpartij gehad, en dat is even belangrijker. Als dat lukt weet ik zeker dat de link vroeg of laat zal ontstaan.&quot;<br />
Yarreck ging weer liggen, en Amber kwam tegen hem aanliggen. En nu voelde hij weer hoe lekker Ambers lichaam aanvoelde. Hij legde zij hand tegen haar rug en ging er teder overheen. Amber bewoog met haar vingertoppen over Yarrecks borstkas. <br />
Amber dacht nog eens na. Ze wist dat als een menselijke man net aan zijn gerief gekomen was het een lange tijd kon duren voordat hij weer zin kon krijgen (ondanks dat ze nooit met een mens het bed had gedeeld). Dat lag bij Elfen anders en daarin zag ze wat nieuwe mogelijkheden.<br />
&quot;Zeg eens, lekkere vent,&quot; zei Amber nog eens.<br />
Yarreck keek verbaasd naar Amber.<br />
&quot;Wat zou je ervan zeggen als we dit nog eens overdoen, en ik absoluut niet wil dat er een link ontstaat?&quot;<br />
Yarreck dacht even na. Eigenlijk had hij de laatste vrijpartij niet goed in zich opgenomen in zijn drang om te linken. Hij duwde Amber met kracht van zich af op haar rug, en liet zichzelf bovenop haar vallen en kuste haar zo innig dat Amber dacht dat ze bijna stikte.<br />
&quot;Hoe is dat als antwoord?&quot; vroeg Yarreck toen.<br />
Amber keek nog eens uitdagend.<br />
&quot;De avond is net begonnen,&quot; zei ze. &quot;Je stopt niet voordat het weer licht wordt, begrepen!&quot;<br />
</p>`},
{"ID":"H08","Caption":"VIII","Content":`<p>
Jan en Gazina liepen door de bossen van Zalzathora op weg naar Veerenburg, de hoofdstad. De bossen waren kalm, en er ging totaal geen enkele vorm van dreiging van uit, zoals dat bij de bossen van Pisangrium wel het geval was. De wind waaide rustig en de vredige indruk werd versterkt door het vrolijke gekwetter van de vogels. Gazina voelde zich dan ook in dit bos helemaal thuis. Het huis van haar pleegouders stond ook in een dergelijk bos, en daardoor had ze de liefde voor de natuur met de paplepel ingegoten gekregen. <br />
Het pad liep kronkelig en was oneffen, maar daar had Gazina totaal geen moeite mee. Het voelde voor haar alsof ze thuiskwam, ook al lag de wereld waar ze was opgegroeid heel ver weg. Gazina keek rond en zag hier een daar een paar konijnen wegschieten. Het was op Zalzathora duidelijk voorjaar1, daar een aantal bomen vol bloesem stonden, en Gazina zelfs hier een daar een paar mannetjesvogels zag die heel druk in de weer waren, om indruk te maken op de vrouwtjes. Dit was echt een bos waar Gazina dagen in zou kunnen rondhangen om weg te dromen.<br />
Na een lange wandeling zag ze een brug. Er leunde iemand tegen de brug. Het was een meisje. Oud kon ze niet zijn, hooguit een jaar of negentien. Opvallend was ze wel. Haar haren zaten vol modder, vliegen en klitten. Welke kleur het mocht hebben viel niet op te maken. Haar kleren zaten vol scheuren en vuiligheid, en naast het feit dat haar gewone decolleté niet echt verborgen was, was er ook een aardig &quot;bouwvakkerdecolleté&quot; te zien. Ze stond op blote voeten, en die voeten stonden vol wratten.<br />
Toen ze Jan en Gazina in de gaten kreeg keek ze op.<br />
&quot;Och, k&egrave;k nah ‘ns wie we doar hebbuh. As d&agrave;h die goeie ouwe Jan nie is,&quot; riep ze. &quot;Hoe ist meej jouw, jonguh?&quot;<br />
&quot;Je weet dat het met slechte mensen altijd goed gaat, h&egrave; dame,&quot; zei Jan.<br />
&quot;Gaai benne gin slecht m&egrave;&egrave;ns, d&agrave;h witte!,&quot; zei het meisje ferm. &quot;Wiesdah?&quot;<br />
Jan keek naar Gazina.<br />
&quot;Dit is Gazina,&quot; zei Jan.<br />
&quot;Gaazinah? Wa luk na toch om kennis tuh moakuh!,&quot; zei het meisje en ze omhelsde Gazina. Gazina zat hier echter niet op te wachten en duwde het meisje meteen weg.<br />
&quot;Getverdemme, blijf van me af,&quot; riep ze. &quot;Ga je nooit in bad of zo? En je kleren, wanneer hebben die voor het laatst een wastobbe gezien? We hebben zo te zien niet allemaal manieren geleerd.&quot;<br />
&quot;Gazina,&quot; riep Jan. &quot;Effe chillen, ja!&quot;<br />
&quot;Chillen?&quot; reageerde Gazina verbaasd.<br />
&quot;H&egrave;h bedoel rust&egrave;g oan!&quot;<br />
Gazina keek met een blik verafschuwing naar het meisje.<br />
&quot;Voordat je fouten maakt, Gazina,&quot; ging Jan verder. &quot;Dit is prinses Caramella. De kroonprinses van Zalzathora. De toekomstige koningin.&quot;<br />
Gazina keek verbaasd naar het meisje.<br />
&quot;Dat is de toekomstige koningin?&quot;<br />
&quot;D&agrave;h z&egrave;l nog wel unne poar joar dur&ugrave;h, heur,&quot; zei Caramella. &quot;Ons poa v&egrave;n muh noch un bietje tuh jung veur 't zwaore ambt.&quot;<br />
&quot;Als zij de prinses is wil ik niet weten hoe het gewone volk er hier uitziet.&quot;<br />
&quot;Dat zal je nog verbazen,&quot; zei Jan. &quot;Dat zijn van die hele nette heren en dames, voor wie werken zwaar beneden hun stand is.&quot;<br />
Gazina keek verbaasd.<br />
&quot;Je maakt een grapje&quot;<br />
&quot;Nope,&quot; zei Jan. &quot;Ik meen het serieus.&quot;<br />
&quot;Doar wilde nie meej rondhanguh,&quot; zei Caramella. &quot;Ze d&egrave;&egrave;nke dah ze allus z&egrave;n. Ze hebbe allemoal un bietje gr&ograve;&ograve;th&egrave;dswoanzin.&quot;<br />
Op dat moment klonk er een plons.<br />
&quot;Och gut,&quot; zei Caramella. &quot;Ut is wir zoweit!&quot;<br />
Gazina keek verschrikt naar het water onder de brug en zag dat een klein kind in het water was gevallen.<br />
&quot;De stroom is te sterk hier,&quot; zei Jan. &quot;Als dat kind al kan zwemmen zal het water haar meesleuren.&quot;<br />
&quot;Verderop is een waterval,&quot; gilde Gazina die stroomafwaarts keek. &quot;Als we niets doen zal dat kind van de wereld afvallen!&quot;<br />
De ouders van het kind stonden aan de kant van het water.<br />
&quot;Eej jullie doar,&quot; riep Caramella naar de overkant. &quot;Zoude oe kind niejuns &ugrave;&ugrave;t ut woater hoaluh.&quot;<br />
De ouders keken verschrikt naar Caramella en toen naar het water, maar geen van beiden sprongen ze in het water om hun kind te redden.<br />
&quot;Gutochgutochgut,&quot; riep Caramella.  &quot;Ze z&egrave;n wir uns bang dah hunne kl&egrave;re nat worre&quot; <br />
Zonder al te veel na te denken dook Caramella het water in.<br />
&quot;Caramella, pas op! &quot; riep Jan. &quot;De stroming kan jou ook van de wereld afsleuren!&quot;<br />
Maar Caramella hoorde niets meer. Met krachtige slagen vocht ze tegen de stroom, en pakte het kind op en zwom terug naar de kant.<br />
Gazina stond op de kant en hielp Caramella en het kind het water uit.<br />
Caramella pakte het kind en knuffelde het even.<br />
&quot;Ge benne wir v&egrave;lig,&quot; zei ze. &quot;Nie al tuh errug geschrokkuh?&quot;<br />
Het kind schudde haar hoofd.<br />
&quot;Goe zo,&quot; zei Caramella. &quot;Zo mag ik ut horuh!&quot;<br />
De ouders van het kind kwamen snel over de brug gerend.<br />
Caramella pakte het meisje op en presenteerde haar aan de ouders.<br />
&quot;Asteblief,&quot; zei ze. &quot;Ze &egrave;s nog gezond en wel. Al&egrave;nig un bietje nat!&quot;<br />
&quot;Affreus!,&quot; riep de moeder van het kind. &quot;Hoe durf je met je vieze handen onze Antoinette-Françoise aan te raken!&quot;<br />
De moeder nam het kind over en ze liep met een minachtende houding terug over de brug.<br />
&quot;HEE!&quot; riep Gazina. &quot;Vieze handen of niet, ze heeft wel het leven van Antoinette-Françoise gered. Kunt u niet wat dankbaarder zijn?&quot;<br />
&quot;Loa moar,&quot; zei Caramella. &quot;Ben't gew&egrave;nd. Wemme tenslotte nie allemoal manieruh gel&egrave;r, eej!&quot;<br />
Gazina keek verschrikt naar Caramella, die een brutale knipoog plaatste die Gazina deed beseffen dat ze wel iets te vlug geoordeeld had.<br />
&quot;De leden van het koningshuis komen misschien over, alsof ze onbeschofter zijn dan de familie Flodder,&quot; zei Jan. &quot;Maar als je het echt goed bekijkt, zie je dat het echte gebrek aan manieren toch bij dat &quot;nette&quot; volk is.&quot;<br />
&quot;Wie is de familie Flodder?&quot; vroeg Gazina.<br />
&quot;Ach j&ocirc;h,&quot; zei Caramella. &quot;Ge had zu uns moetuh heure als ik dat kind een zoen gegevuh had&quot;<br />
&quot;Hoezo?&quot;<br />
&quot;Ja, kik, ik heb noameluk bek-rot, witte,&quot; zei Caramella en ze trok een grijns die Gazina bijna deed kokhalzen. Ze wist meteen wat er met &quot;bek-rot&quot; bedoeld werd.<br />
&quot;Maar goed, terzake, Caramella,&quot; zei Jan. &quot;Ik was gekomen om met je vader te spreken.&quot;<br />
&quot;Ons poa?&quot; reageerde Caramella. &quot;Kwitnie of d&agrave;h zo'n goei idee is&quot;<br />
&quot;Hoezo niet?&quot;<br />
&quot;Joa, hij's de loatste t&egrave;d nogal sjachie, witte.&quot;<br />
&quot;Sjachie? Waar is hij dan zo sjachie over?&quot;<br />
&quot;Wat is sjachie?&quot;  vroeg Gazina verbaasd.<br />
&quot;Chagrijnig,&quot; antwoordde Jan.<br />
&quot;Oh.&quot;<br />
&quot;Ach j&ocirc;h, w&agrave;h denkte?&quot; zei Caramella. &quot;Vanwigge d&agrave;h stelletjuh bozo's van de kerruk van Dhyo, natuurluk.&quot;<br />
&quot;De kerk van Dhyo?&quot;<br />
&quot;Joah, d&agrave;h stelletjuh sukkels valt uns al wììkuh lastig. Ons poa wil nie zegguh w&agrave;h zuh willuh, moar ut moet nogal belaangr&egrave;k benne. Ons pa, heb me al gewoarschuwd d&agrave;h ut w&egrave;l uns knokkuh kaan worre!&quot;<br />
&quot;Knokken? Hij bedoelt oorlog?&quot;<br />
&quot;Joa, zo kunde ut natuurl&egrave;k ok noemuh!&quot;<br />
&quot;Dan had Melkonar dus gelijk,&quot; zei Jan verschrikt. &quot;Er gebeuren hier dingen die niet pluis zijn. Ik vraag me alleen af wat zo belangrijk kan zijn dat Varticonus er oorlog om wil voeren.&quot;<br />
&quot;Joa, dah wit ik dus allemoal niej, eej,&quot; zei Caramella. &quot;Dah kunde m&egrave;schien toch beter oan ons poa zelluf vroaguh. Moar houw er rekun&egrave;ng meej, dah ons poa behoorluk sjachie &egrave;s, en z&egrave;n h&ugrave;&ugrave;dige toalgebruk, niej gesch&egrave;kt &egrave;s veur gevoeliguh &ograve;ruh.&quot;<br />
&quot;Ik zal er rekening mee houden,&quot; lachte Jan. &quot;Kom mee, Gazina. Het paleis ligt hier maar vijf minuten lopen vandaan.&quot;<br />
