`Door de straten van dit mistroostige toneel liep een man. Hij leek van middelbare leeftijd en zijn hoofd was helemaal kaal. Hij droeg een zwart leren jack en een strakke zwarte spijkerbroek. Dat was al iets vreemds omdat spijkerbroeken niet in het modebeeld van Xorox hoorden. Verder droeg hij een paar cowboyachtige laarzen. Zo liep hij door de regenplassen. Hij was tot aan zijn hemd toe nat, maar dat leek hem eigenlijk niet te storen. Hij leek vooral een café te zoeken. En die waren er genoeg. Cafés die weliswaar ook dienst deden als vechthonk en hoerentent, maar dat maakte verder niet uit.
Bij een rokerig café hield hij halt en hij keek over de klapdeurtjes naar binnen. Met een strakke blik leek hij een van de serveersters in de gaten te houden. Nu moet het gezegd worden dat ze er beslist niet lelijk uitzag. Ze had een kort rokje aan en haar bovenkleding kon haar cupmaat niet verhullen. Haar lange golvende blonde haar leek haast te dansen op haar bewegingen, maar haar gezicht had een duidelijke blik die zei &quot;Don't mess with me.&quot; Nu kwam zo'n waarschuwing op Pisangrium altijd terecht bij dovemansoren, maar de man zag al meteen dat iemand die deze waarschuwing in de wind sloeg zonder pardon een trap in zijn gezicht kreeg.
Hij bekeek haar nog een paar keer en liep toen het café binnen.
Zonder zijn blik van haar af te wenden liep hij naar een tafel en ging zitten, en bleef haar zwijgzaam bekijken.
De serveerster leek dit alles niet in de gaten te hebben, en ging gewoon rustig door met bedienen, en het verkopen van trappen aan mannen die hun handen niet thuis konden houden.
&quot;Zeg Gazina,&quot; zei een andere serveerster opeens. &quot;Die kale daar houdt je nu al geruime tijd in de gaten. Volgens mij wil hij iets van je!&quot;
De man fronste nog eens diep bij het horen van de naam van de serveerster.
Gazina keek om en zag de man zitten.
&quot;Zeg eens, gluurder, je zit al de hele tijd naar me te kijken, maar zou je niet eens wat bestellen?&quot;
De man zei niets maar gebaarde haar dichterbij te komen.
&quot;Oppassen, Gazina,&quot; zei een collega, maar die wist ook wel dat Gazina zich niet zo makkelijk zou laten pakken.
&quot;Wat moet je van me?&quot; vroeg Gazina.
&quot;Jij bent Gazina?&quot;
&quot;Ja… En wat dan nog?&quot;
&quot;Ik wil graag een grote pul bier, en ik zou je graag willen spreken… Onder vier ogen.&quot;
&quot;Spreken, hè? Ik ken dat, dat &quot;spreken.&quot; De vorm van spreken die uitsluitend zonder kleren kan worden gedaan.&quot;
&quot;Als iets me niet boeit is het een naakt vrouwenlichaam. Ik wil je alleen maar spreken!&quot;
Gazina keek verbaasd op.
&quot;Je bedoelt dat je het doet met mannen?&quot;
&quot;SSSST! Niet te hard, als een aanhanger van Dhyo het hoort ben ik screwed.&quot;
&quot;Screwed? Wat is screwed?&quot;
&quot;D'r bij, genaaid, whatever. Geef me gewoon maar mijn bier en zorg dat je na sluitingstijd bij de zuidingang van het Warvelbos staat. Wat ik je te vertellen heb is zeer belangrijk.&quot;
Gazina keek zeer verbaasd, ze liep naar de bar, tapte een houten pul bier en gaf deze aan de vreemde man.
Nog voor ze de prijs van het bier kon noemen legde de man een aantal munten voor haar neer op tafel. Verbaasd over het feit dat de man in één keer betaalde en dat ze het geld niet uit hem moest slaan (zoals dat bij de meeste klanten wel het geval was) pakte ze de munten op, en liep terug naar de bar.
&quot;Wat wilde hij van je?&quot;
